# MonitorKube needs read-only access to Services cluster-wide (or scope
# ClusterRoleBinding down to specific namespaces if you'd rather not
# grant cluster-wide read access).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitorkube
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitorkube
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitorkube
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monitorkube
subjects:
  - kind: ServiceAccount
    name: monitorkube
    namespace: monitoring
